kerchunk_pipeline:
  s3:
    endpoint_url: "https://projects.pawsey.org.au"
    bucket: "weather"
    region_name: "us-east-1"
    secret_scope: "pawsey0411"
    access_key_secret_name: "access_key"
    secret_key_secret_name: "secret_key"

  source_flows:
    - id: "ecmwf_daily_nc"
      enabled: true
      mode: "prefix_regex"
      prefix: "ecmwf_op_clean/"
      key_regex: "^ecmwf_op_clean/[0-9]{4}/[0-9]{2}/[0-9]{2}\\.nc$"

    - id: "dpird_final_singleton"
      enabled: true
      mode: "exact_key"
      exact_key: "FINAL_DPIRD/DPIRD_final_stations.nc"

  output:
    staging_volume_path: "acacia_refs_staging"
    ledger_path: "acacia_refs_staging/_state/inventory_ledger.json"
    temp_path: "acacia_refs_temp"

  execution:
    max_workers: 16
    list_page_size: 1000