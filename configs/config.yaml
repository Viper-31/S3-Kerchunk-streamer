kerchunk_pipeline:
  s3:
    endpoint_url: "https://projects.pawsey.org.au"
    bucket: "weather"
    region_name: "us-east-1"
    secret_scope: "pawsey0411"
    
  source_flows:
    - id: "ecmwf_daily_nc"
      enabled: true
      mode: "prefix_regex"
      prefix: "ecmwf_op_clean/"
      key_regex: "^ecmwf_op_clean/[0-9]{4}/[0-9]{2}/[0-9]{2}\\.nc$"

    - id: "dpird_final_singleton"
      enabled: true
      mode: "exact_key"
      exact_key: "FINAL_DPIRD/DPIRD_final_stations.nc"

  output:
    staging_volume_path: "acacia_refs_staging"
    ledger_path: "acacia_refs_staging/_state/inventory_ledger.json"
    temp_path: "acacia_refs_temp"

  execution:
    max_workers: 16
    list_page_size: 1000
    parquet_record_size: 100000 # Will generate refs.0.parq, refs.1.parq, etc. if total refs > parquet_record_size.
    categorical_threshold: 10 # Only applicable for vz.open_mfadataset(). If vds has <10 unique S3 URLs, it will store the S3 URLs in a lookup table for quick access. Otherwise, it will store the S3 URLs in the parquet file and read them on demand.
